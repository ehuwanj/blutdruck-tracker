name: blutdruck_tracker
description: "Personal blood pressure tracker. Local-first, no backend."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  collection: ^1.19.0
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  fl_chart: ^0.69.2
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  go_router: ^14.6.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.3
  sqlite3_flutter_libs: ^0.5.26
  timezone: ^0.10.0
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  # Used by integration_test/app_test.dart to stub the platform-interface
  # layer of path_provider so the export flow can write to a temp dir
  # without a real device.
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
